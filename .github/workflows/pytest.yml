name: Python Testing CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Verifica codul din repository
      uses: actions/checkout@v4

    - name: Configureaza Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Poți schimba cu versiunea ta de Python

    - name: Instaleaza dependentele
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ruleaza testele cu Pytest
      run: |
        pytest -v